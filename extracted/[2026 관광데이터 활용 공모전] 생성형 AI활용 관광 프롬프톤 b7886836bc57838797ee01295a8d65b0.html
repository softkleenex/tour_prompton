e:square">반복적으로 발생하는 문제인가요?</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="dac86836-bc57-83e3-b083-814cfaf89b53" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-yellow"><strong>Analyze 단계 : </strong></mark>문제 정의하기<div style="display:contents" dir="auto"><ul id="83c86836-bc57-8379-a04e-811e5bba0683" class="bulleted-list"><li style="list-style-type:square">현재 방식은 왜 불편한가요?</li></ul></div><div style="display:contents" dir="auto"><ul id="1b186836-bc57-8257-ac1c-8148048cc84e" class="bulleted-list"><li style="list-style-type:square">단순 정보 부족의 문제인가요, 아니면 과정 자체가 복잡한가요?</li></ul></div><div style="display:contents" dir="auto"><ul id="7c686836-bc57-8338-a1e3-016db3c8feb9" class="bulleted-list"><li style="list-style-type:square">사용자가 실제로 원하는 결과는 무엇인가요?</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="78386836-bc57-835e-a1c6-016689ec458e" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-yellow"><strong>Agent Thinking 단계 :</strong></mark> 서비스 형태 구체화하기<div style="display:contents" dir="auto"><ul id="bfa86836-bc57-8318-a71a-8164b1968571" class="bulleted-list"><li style="list-style-type:square">사용자는 어떤 흐름으로 서비스를 이용하게 될까요?</li></ul></div><div style="display:contents" dir="auto"><ul id="b0186836-bc57-83f0-abb6-01b1ee67e181" class="bulleted-list"><li style="list-style-type:square">AI는 어디에서 추천·요약·생성·연결 역할을 하게 될까요?</li></ul></div><div style="display:contents" dir="auto"><ul id="07e86836-bc57-83e5-b125-01e64ec05563" class="bulleted-list"><li style="list-style-type:square">관광데이터(OpenAPI)와 생성형 AI를 결합하면 어떤 새로운 경험을 만들 수 있을까요?</li></ul></div><div style="display:contents" dir="auto"><ul id="d9a86836-bc57-83cf-9576-816f2278e659" class="bulleted-list"><li style="list-style-type:square">웹·앱 형태로 확장한다면 어떤 기능이 핵심이 될까요?</li></ul></div></li></ul></div></li></ul></div></details></li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-default callout" style="white-space:pre-wrap;display:flex" id="ca786836-bc57-82ff-982c-01cf69268e5b"><div style="font-size:1.5em"><span class="icon">🛠</span></div><div style="width:100%"><mark class="highlight-brown_background"><strong>프롬프트 환경 및 활용 모델</strong></mark><div style="display:contents" dir="auto"><p id="21a86836-bc57-831f-aaa5-81878fdf3aac" class=""><strong>🚀 </strong><mark class="highlight-default_background"><strong>프롬프톤 개발 플랫폼 :</strong></mark><mark class="highlight-orange"><mark class="highlight-default_background"><strong> ennoia (엔노이아)</strong></mark></mark></p></div><div style="display:contents" dir="auto"><ul id="b9086836-bc57-838c-bed2-81accf4056b5" class="bulleted-list"><li style="list-style-type:disc">ennoia는 LLM을 기업 내부 데이터 및 시스템과 안전하게 연결해, <br/>AI 에이전트와 앱을 만들고 운영할 수 있도록 지원하는 <strong>AI 플랫폼</strong>입니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="40b86836-bc57-83ee-b2d7-81287da9ce29" class="bulleted-list"><li style="list-style-type:disc">비개발자도 쉽고 빠르게 생성형 AI 서비스와 AI Agent를 기획·개발할 수 있도록 지원합니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="37e86836-bc57-8364-b65d-0147dd662a05" class="bulleted-list"><li style="list-style-type:disc">이번 프롬프톤에서는 ennoia와 한국관광공사 OpenAPI를 활용해 <br/>실제 관광 문제를 해결하는 <strong>관광 서비스를 구현</strong>하게 됩니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="8b586836-bc57-8208-9c50-0192198f4156" class="bulleted-list"><li style="list-style-type:disc">프롬프트 개발, RAG 기반 문서 연결, API 연동, Agent Workflow 구성 및 배포 등 <br/>생성형 AI 서비스 개발 전반을 직접 경험할 수 있습니다.</li></ul></div><div style="display:contents" dir="auto"><p id="3c086836-bc57-824f-adfb-815fbb03d29f" class="">🌐 <strong>프롬프톤 활용 AI 모델</strong></p></div><div style="display:contents" dir="auto"><ul id="b3b86836-bc57-8261-b0f9-810a9b026ee5" class="bulleted-list"><li style="list-style-type:disc">OpenAI, Anthropic, Google, HyperCLOVA X 등 다양한 LLM 기반 활용 가능</li></ul></div><div style="display:contents" dir="auto"><ul id="e2c86836-bc57-8343-b45c-0115e04819ef" class="bulleted-list"><li style="list-style-type:disc">목적과 서비스 특성에 맞는 모델 및 Agent Workflow 구성 가능</li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-default callout" style="white-space:pre-wrap;display:flex" id="5bc86836-bc57-829b-9d8c-811a8914f37d"><div style="font-size:1.5em"><span class="icon">✨</span></div><div style="width:100%"><mark class="highlight-brown_background"><strong>ennoia FAQ</strong></mark><div style="display:contents" dir="auto"><ul id="d2b86836-bc57-834d-a4af-01da961af3bc" class="toggle"><li><details open=""><summary><mark class="highlight-default"><strong>ennoia는 ChatGPT처럼 대화하며 사용하면 되나요?</strong></mark></summary><div style="display:contents" dir="auto"><ul id="0f486836-bc57-823b-9232-8182452c8831" class="bulleted-list"><li style="list-style-type:disc">ChatGPT가 질문에 답변하는 범용 대화형 AI에 가깝다면, ennoia는 생성형 AI 서비스를 직접 기획·개발·운영할 수 있도록 지원하는 플랫폼이라는 점이 가장 큰 차이입니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="3d486836-bc57-8384-bf80-018b764518d0" class="bulleted-list"><li style="list-style-type:disc">관광데이터(OpenAPI), 문서(RAG), 외부 서비스(API) 등을 연결해 실제 서비스 형태로 구현할 수 있으며, 사용자 요청에 따라 정보를 검색·추천·정리·연결하는 기능까지 구성할 수 있습니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="a6886836-bc57-8298-8bcb-0197b9918a5a" class="bulleted-list"><li style="list-style-type:disc">이번 프롬프톤에서는 단순 챗봇 제작이 아니라, 생성형 AI와 관광데이터를 활용한 웹·앱 기반 관광 서비스를 구현하는 것을 목표로 합니다.</li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="43c86836-bc57-83ef-9f6c-01f81f93f568" class="toggle"><li><details open=""><summary><strong>반드시 AI Agent 형태로 구현해야 하나요?</strong></summary><div style="display:contents" dir="auto"><ul id="02f86836-bc57-8360-844f-01c8407ef202" class="bulleted-list"><li style="list-style-type:disc">반드시 복잡한 AI Agent 구조가 필요한 것은 아닙니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="52286836-bc57-8310-bab6-01e8a14e4319" class="bulleted-list"><li style="list-style-type:disc">사용자 요청을 분석하고, 데이터를 연결하고, 결과를 생성하거나 실행하는 흐름까지 고려하면 더욱 확장성 있는 서비스 구현이 가능합니다.</li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="d2786836-bc57-83d9-8d19-012cf71c3d16" class="toggle"><li><details open=""><summary><mark class="highlight-default"><strong>${가변}(Variable)은 왜 사용하나요?</strong></mark></summary><div style="display:contents" dir="auto"><ul id="d7586836-bc57-83bb-9089-81cefddc957b" class="bulleted-list"><li style="list-style-type:disc">사용자 입력값이나 상황에 따라 달라지는 정보를 유연하게 처리하기 위한 기능입니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="4e186836-bc57-820c-8132-813097fcc21d" class="bulleted-list"><li style="list-style-type:disc">예를 들어 관광지, 지역, 일정, 여행 스타일, 사용자 요청 등의 값을 변수로 설정하면 하나의 프롬프트를 다양한 상황에 맞게 활용할 수 있습니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="abc86836-bc57-8211-b7e7-8123b3eb8a28" class="bulleted-list"><li style="list-style-type:disc">Variable을 활용하면 테스트, API 연동, 서비스 확장 및 반복 실행에도 더욱 효과적으로 대응할 수 있습니다.</li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="92186836-bc57-82c8-a76c-01a644bf82ce" class="toggle"><li><details open=""><summary><strong>RAG는 언제 활용하면 좋나요?</strong></summary><div style="display:contents" dir="auto"><ul id="bec86836-bc57-8379-b928-81d32e7e4e91" class="bulleted-list"><li style="list-style-type:disc">관광 정보, 지역 가이드, 정책, 매뉴얼 등 특정 문서를 기반으로 보다 정확한 답변이나 기능을 제공하고 싶을 때 활용할 수 있습니다.</li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="12086836-bc57-82ed-984e-0141ec67773e" class="toggle"><li><details open=""><summary><strong>API 연동은 꼭 필요한가요?</strong></summary><div style="display:contents" dir="auto"><ul id="6aa86836-bc57-8238-b151-01692c4bfb77" class="bulleted-list"><li style="list-style-type:disc">이번 프롬프톤에서는 한국관광공사 OpenAPI 활용이 필수입니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="83e86836-bc57-8396-b608-81eccc06f730" class="bulleted-list"><li style="list-style-type:disc">관광데이터와 생성형 AI를 연결해 실제 사용자 경험으로 구현하는 것이 핵심입니다.</li></ul></div></details></li></ul></div></div></figure></div></div></div><div style="display:contents" dir="auto"><div id="e1f86836-bc57-834f-b99e-01978f8b7e03" style="width:100%" class="column"><div style="display:contents" dir="ltr"><figure class="block-color-default callout" style="white-space:pre-wrap;display:flex" id="e6f86836-bc57-8231-80da-01fafeb5cd19"><div style="font-size:1.5em"><span class="icon">📑</span></div><div style="width:100%"><mark class="highlight-brown_background"><strong>서비스 제출 안내</strong></mark><mark class="highlight-default_background"><strong> </strong></mark><div style="display:contents" dir="auto"><ul id="41d86836-bc57-8372-adc3-013c3a5dce6b" class="toggle"><li><details open=""><summary><strong>제출 가이드</strong></summary><div style="display:contents" dir="auto"><ul id="3a186836-bc57-83b1-a0b0-81405046d914" class="bulleted-list"><li style="list-style-type:disc">제출 방법 : 팀 대표자가 결과물을 취합하여 제출해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="34786836-bc57-82c2-8145-81fba16d63b4" class="bulleted-list"><li style="list-style-type:disc"><strong>필수 제출</strong><div style="display:contents" dir="auto"><p id="c8286836-bc57-823a-8f3a-81a73db75034" class="">⚠️ 유의 사항 : 한국관광공사 OpenAPI 활용신청 정보(신청자명, 인증키, API 리스트)를 기반으로<br/><strong>심사대상 필수 조건인 공사 API 활용여부를 확인할 예정</strong>입니다. 따라서 정확한 정보를 입력하여주시기 바랍니다.</p></div><div style="display:contents" dir="auto"><ul id="b5886836-bc57-82d2-b04b-014a8b272689" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-orange"><strong>엔노이아 Studio 앱 공유 URL</strong></mark></li></ul></div><div style="display:contents" dir="auto"><ul id="b4a86836-bc57-832b-b211-816280fc2fe4" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-orange"><strong>서비스 소개서(별도 양식 제공)</strong></mark></li></ul></div><div style="display:contents" dir="auto"><ul id="f0086836-bc57-822f-93ff-81d65823af6e" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-orange"><strong>한국관광공사 OpenAPI 활용 신청자명</strong></mark></li></ul></div><div style="display:contents" dir="auto"><ul id="13d86836-bc57-82d4-a38b-01833a160c44" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-orange"><strong>한국관광공사 OpenAPI 활용 신청자 서비스 인증키</strong></mark></li></ul></div><div style="display:contents" dir="auto"><ul id="d7286836-bc57-8212-8a00-81c9ac8155a3" class="bulleted-list"><li style="list-style-type:circle"><mark class="highlight-orange"><strong>서비스 구현 시 활용한 한국관광공사 OpenAPI 리스트</strong></mark></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="14d86836-bc57-82a4-9b47-811570d818bd" class="bulleted-list"><li style="list-style-type:disc">선택 제출<div style="display:contents" dir="auto"><ul id="94d86836-bc57-8240-9879-814731df5025" class="bulleted-list"><li style="list-style-type:circle">추가 참고 자료 (기획안, 시연 영상 등)</li></ul></div><div style="display:contents" dir="auto"><ul id="11386836-bc57-8284-b509-01e8257f9699" class="bulleted-list"><li style="list-style-type:circle">서비스 관련 외부 링크</li></ul></div></li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="2ba86836-bc57-8327-afb7-812eb8e49c5c" class="toggle"><li><details open=""><summary><strong>제출 방법</strong></summary><div style="display:contents" dir="auto"><ul id="62e86836-bc57-8201-9d49-014253b9712f" class="toggle"><li><details open=""><summary><strong>STEP 01) 상세 설명 작성하기</strong></summary><div style="display:contents" dir="auto"><ul id="bad86836-bc57-8330-bc30-012eda39c446" class="bulleted-list"><li style="list-style-type:disc"><strong>서비스 제목은 무엇인가요?</strong><div style="display:contents" dir="auto"><ul id="6ed86836-bc57-8277-8e12-01e2dd53d028" class="bulleted-list"><li style="list-style-type:circle">서비스명, 기능명, 문제 해결 관점 모두 제목으로 입력 가능합니다.<br/>예시) 지역 기반 맛집 추천 프롬프트, 여행 일정 자동 생성 AI 어시스턴트</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="17486836-bc57-831c-8eba-01bf7af2e261" class="bulleted-list"><li style="list-style-type:disc"><strong>서비스 내용을 요약 설명해주세요.</strong><div style="display:contents" dir="auto"><ul id="17486836-bc57-837b-8e69-014c66590baa" class="bulleted-list"><li style="list-style-type:circle">이 서비스가 무엇을 해결하는지, 어떤 결과를 내는지를 간단히 설명해 주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="11d86836-bc57-8256-9259-01ed7e5eabfc" class="bulleted-list"><li style="list-style-type:circle">세부 기능보다는 전체 개요 중심으로 작성하면 좋습니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="b9d86836-bc57-8278-8bcc-01451153d3a8" class="bulleted-list"><li style="list-style-type:circle">서비스가 나오게 된 로직(Logic) 위주로 설명해주셔도 좋습니다.</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="6b586836-bc57-8372-b747-8177e529c9d8" class="bulleted-list"><li style="list-style-type:disc"><strong>해당 주제를 선정한 이유는 무엇인가요?</strong><div style="display:contents" dir="auto"><ul id="18186836-bc57-831b-b1a1-81fbba7def14" class="bulleted-list"><li style="list-style-type:circle">왜 해당 주제를 선택했는 지에 대해 자유롭게 작성해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="5d886836-bc57-82d4-9906-01cad17ba88a" class="bulleted-list"><li style="list-style-type:circle">예) 불편했던 경험, 평소 관심사 등</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="dd286836-bc57-832f-817b-811f912b942a" class="bulleted-list"><li style="list-style-type:disc"><strong>타겟 사용자는 누구인가요?</strong><div style="display:contents" dir="auto"><ul id="41486836-bc57-8279-b236-013e79869784" class="bulleted-list"><li style="list-style-type:circle">이 서비스를 주로 사용하게 될 사용자를 구체적으로 작성해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="9cb86836-bc57-82a1-95f9-81ff0dc506fb" class="bulleted-list"><li style="list-style-type:circle">예) 국내여행객, 외국인여행객, 가족여행객, 단체여행객 등</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="64086836-bc57-82e0-a90b-01d3716581d3" class="bulleted-list"><li style="list-style-type:disc"><strong>공모전 수행 중 시행착오와 개선을 위한 시도가 있었나요?</strong><div style="display:contents" dir="auto"><ul id="7b486836-bc57-83c1-b9a4-812540bffcf8" class="bulleted-list"><li style="list-style-type:circle">프롬프트를 수정했던 경험, 원하는 결과가 안 나와서 바꿨던 부분 등을 작성해 주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="abe86836-bc57-82f0-935c-819099488cf1" class="bulleted-list"><li style="list-style-type:circle">특별히 없었다면 ‘없음’ 이라고 작성해도 괜찮습니다.</li></ul></div></li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="67686836-bc57-82a4-8f0b-0152bf42537d" class="toggle"><li><details open=""><summary><strong>STEP 02) 서비스 제출하기 ( </strong><mark class="highlight-blue"><strong><a href="https://forms.gle/86Q33mWqMhz5wALL8">제출 링크 바로가기</a></strong></mark><strong> )</strong></summary><div style="display:contents" dir="auto"><ul id="b5086836-bc57-82bc-b5e4-01eb0ebe56ef" class="bulleted-list"><li style="list-style-type:disc"><strong>[필수 제출 ①] 엔노이아 Studio 앱 공유 URL</strong><div style="display:contents" dir="auto"><ul id="0e486836-bc57-8318-9996-010877fe8059" class="bulleted-list"><li style="list-style-type:circle">팀에서 최종 완성한 산출물이 반영된 ennoia Studio 앱 공유 URL을 제출해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="79b86836-bc57-824b-9b60-81fe9e0c7e4d" class="bulleted-list"><li style="list-style-type:circle">제출 방법 : ennoia Studio 접속 → 제출할 앱 선택 → 더보기(...) 버튼 클릭 후 공유하기 메뉴 클릭 → 기본 값 또는 설정을 조정하여 공유 링크 생성 버튼 클릭 → 생성된 URL 링크를 복사하여 제출 폼에 입력</li></ul></div><div style="display:contents" dir="auto"><ul id="bd786836-bc57-8376-bc77-01bb8a29db39" class="bulleted-list"><li style="list-style-type:circle">유의사항을 꼭 확인해주세요.<div style="display:contents" dir="auto"><ul id="9c586836-bc57-8346-86f2-01d412b01026" class="bulleted-list"><li style="list-style-type:square">앱은 기본적으로 권한 사용자만 접근 가능하지만 공유 시 로그인 없이 모든 사용자 이용 가능</li></ul></div><div style="display:contents" dir="auto"><ul id="e0386836-bc57-8333-86dc-81b2a3a0ba7a" class="bulleted-list"><li style="list-style-type:square">제출 전 직접 링크를 열어 정상 작동 여부를 확인해 주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="bef86836-bc57-8398-83a7-8144f62a13dc" class="bulleted-list"><li style="list-style-type:square">링크 접속 시 결과물 확인이 어려운 경우, 심사 대상에서 제외됩니다.</li></ul></div></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="74486836-bc57-8251-b224-8182a3d5be27" class="bulleted-list"><li style="list-style-type:disc"><strong>[필수 제출 ②] 서비스 소개서 (</strong><mark class="highlight-blue"><strong><a href="https://docs.google.com/presentation/d/1-EF1_4H6CmLcwyLbgMS47tflcQnJxxC3AKguVg5tcxo/edit?usp=sharing">양식 바로가기</a></strong></mark><strong>)</strong><div style="display:contents" dir="auto"><ul id="97686836-bc57-83fd-98ef-01f9a43955ea" class="bulleted-list"><li style="list-style-type:circle">팀의 서비스 소개 자료를 제출해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="7f286836-bc57-8374-97c7-81a50d4e9439" class="bulleted-list"><li style="list-style-type:circle">자료는 10장 내외의 분량을 권장합니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="72b86836-bc57-82e0-8b2d-019f9b419b6e" class="bulleted-list"><li style="list-style-type:circle">제출 형식<div style="display:contents" dir="auto"><ul id="72186836-bc57-83ee-b8f0-81ec3b6fee67" class="bulleted-list"><li style="list-style-type:square">PPT, PPTX 또는 PDF 파일 1부</li></ul></div><div style="display:contents" dir="auto"><ul id="59886836-bc57-82a6-901d-81257cfb61d9" class="bulleted-list"><li style="list-style-type:square">파일명 예시 : <strong>팀명_서비스소개서_서비스명</strong></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="f8886836-bc57-83c9-b022-813d194b8931" class="bulleted-list"><li style="list-style-type:circle">작성 가이드<div style="display:contents" dir="auto"><ul id="20986836-bc57-82a3-8749-01ae0ef345b9" class="bulleted-list"><li style="list-style-type:square">팀 소개, 서비스 결과물 소개(문제 정의, 주요기능, 로직, 기대효과 등), 사용된 API 리스트, 시행착오 및 개선시도 등이 포함되도록 작성해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="7b086836-bc57-8204-8b6a-810b62f1dc25" class="bulleted-list"><li style="list-style-type:square">예선 심사 통과 시, 결선 심사에서 본 서비스 소개서를 활용하여 PT 발표를 진행할 예정입니다. (발표시간 10분, 결선 심사 진출 팀 대상 필요 시 자료 추가 수정 요청 가능)</li></ul></div><div style="display:contents" dir="auto"><ul id="b9586836-bc57-8383-9722-013af3cb165b" class="bulleted-list"><li style="list-style-type:square">추후 예선 심사 통과 시, 결선 심사 발표를 대비하여 가급적 핵심 내용 중심으로 구성해주세요.</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="c7986836-bc57-82d5-b025-01b4ad194522" class="bulleted-list"><li style="list-style-type:circle">템플릿 활용 가이드<div style="display:contents" dir="auto"><ul id="54e86836-bc57-83aa-af32-81445e05738e" class="bulleted-list"><li style="list-style-type:square">(양식 바로가기) 링크를 클릭하여 구글 슬라이드 양식을 확인해 주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="dda86836-bc57-8322-8e0e-01dcc628718c" class="bulleted-list"><li style="list-style-type:square">상단 메뉴의 [파일] → [사본 만들기] → [프레젠테이션 전체]를 클릭하여 본인의 드라이브로 복사한 후 내용을 작성해 주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="e5f86836-bc57-8260-ad61-01c7f0c6b6cf" class="bulleted-list"><li style="list-style-type:square">작성이 완료되면 [파일] → [다운로드] → PDF 문서 또는 PPT, PPTX로 저장하여 아래에 업로드 해주세요.</li></ul></div></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="61986836-bc57-8252-92fb-0130ff7b5e58" class="bulleted-list"><li style="list-style-type:disc"><strong>[필수 제출 ③] 한국관광공사 OpenAPI 활용 신청자명</strong><div style="display:contents" dir="auto"><ul id="dfd86836-bc57-830c-8d7e-81b5114617d2" class="bulleted-list"><li style="list-style-type:circle">서비스 구현에 활용한 한국관광공사 OpenAPI 활용 신청자명을 입력해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="f6686836-bc57-8277-a29b-01de1161c663" class="bulleted-list"><li style="list-style-type:circle">(엔노이아 API 커넥터에 연동한 한국관광공사 OpenAPI를 공공데이터포털에서 활용 신청한 사용자명 입력)</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="a5286836-bc57-83b9-b7ee-8197dcca5ac5" class="bulleted-list"><li style="list-style-type:disc"><strong>[필수 제출 ④] 한국관광공사 OpenAPI 활용 신청자 서비스 인증키</strong><div style="display:contents" dir="auto"><ul id="2e686836-bc57-826b-9f4b-01c669c83e45" class="bulleted-list"><li style="list-style-type:circle">서비스 구현에 활용한 한국관광공사 OpenAPI 활용 신청자의 API인증키(서비스키)를 입력해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="a5886836-bc57-82e4-868c-011194bea1cf" class="bulleted-list"><li style="list-style-type:circle">개인 API인증키는 공공데이터포털 로그인 &gt; 마이페이지 &gt; 개인 API 인증키 &gt; 인코딩키(Encoding), 디코딩키(Decoding) 복사 버튼을 통해 활용한 인증키를 모두 제출해주세요.</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="6ea86836-bc57-83c4-9b28-81d0cce3c284" class="bulleted-list"><li style="list-style-type:disc"><strong>[필수 제출 ⑤] 서비스 구현 시 활용한 한국관광공사 OpenAPI 리스트</strong><div style="display:contents" dir="auto"><ul id="79a86836-bc57-82df-81a2-010865a80e9f" class="bulleted-list"><li style="list-style-type:circle">서비스 구현에 활용한 한국관광공사 OpenAPI를 모두 선택해주세요.</li></ul></div><div style="display:contents" dir="auto"><ul id="6ea86836-bc57-82cc-a75d-816d526ec93c" class="toggle"><li><details open=""><summary>실제 서비스에 활용한 OpenAPI만 선택해주세요.</summary><div style="display:contents" dir="auto"><p id="e3886836-bc57-8256-bae9-014c386085b8" class="">국문 관광정보 서비스<br/>영문 관광정보 서비스<br/>일문 관광정보 서비스<br/>중문 간체 관광정보 서비스<br/>중문 번체 관광정보 서비스<br/>독어 관광정보 서비스<br/>불어 관광정보 서비스<br/>서어 관광정보 서비스<br/>노어 관광정보 서비스<br/>무장애 여행 정보 서비스<br/>관광사진 정보 서비스<br/>고캠핑 정보 조회 서비스<br/>관광지 오디오 가이드 정보 서비스<br/>관광 빅데이터 정보 서비스<br/>두루누비 정보 서비스<br/>관광인 채용 정보 서비스<br/>반려동물 동반여행 서비스<br/>기초지자체 중심관광지 정보 서비스<br/>관광지별 연관관광지 정보 서비스<br/>관광지 집중률 방문자 추이 예측 정보 서비스<br/>의료 관광정보 서비스<br/>웰니스 관광정보 서비스<br/>관광공모전(사진) 수상작 정보 서비스<br/>지역별 관광 다양성 정보 서비스<br/>지역별 관광 수요 강도 정보 서비스<br/>지역별 관광 자원 수요 정보 서비스</p></div></details></li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="fbb86836-bc57-82e6-aad2-016013a98ea3" class="bulleted-list"><li style="list-style-type:disc"><strong>[선택 제출] </strong><div style="display:contents" dir="auto"><ul id="93786836-bc57-822d-999a-013ee9fd25e4" class="bulleted-list"><li style="list-style-type:circle">보다 원활한 심사를 위해 아래 자료를 함께 제출할 수 있습니다.<div style="display:contents" dir="auto"><ul id="14d86836-bc57-832d-99a8-01ceb6ad6a2c" class="bulleted-list"><li style="list-style-type:square">추가 참고 자료 (상세 기획안, 시연 영상 등)</li></ul></div><div style="display:contents" dir="auto"><ul id="8d786836-bc57-8209-9459-0182eae69afe" class="bulleted-list"><li style="list-style-type:square">서비스 관련 외부 링크 (엔노이아 앱 결과물 활용 앱/웹 서비스 URL, Notion, GitHub, Figma 등)</li></ul></div></li></ul></div></li></ul></div></details></li></ul></div></details></li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-default callout" style="white-space:pre-wrap;display:flex" id="59386836-bc57-82df-ac69-014937ccb3bb"><div style="font-size:1.5em"><span class="icon">🔍</span></div><div style="width:100%"><mark class="highlight-brown_background"><strong>심사 안내</strong></mark><div style="display:contents" dir="auto"><ul id="7e586836-bc57-8240-a38c-81f989d7d709" class="block-color-default toggle"><li><details open=""><summary><strong>예선심사 및 합격자 발표</strong></summary><div style="display:contents" dir="auto"><ul id="48386836-bc57-836d-b67b-0169bb960bb8" class="bulleted-list"><li style="list-style-type:disc">6.10(수) 16:00까지 제출한 서비스를 대상으로 심사를 수행합니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="53686836-bc57-8316-b822-81286c7f1ebc" class="bulleted-list"><li style="list-style-type:disc">6.18(목) 최종 선발 규모의 1.5배수인 총 15팀을 선정 예정입니다.</li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="2a086836-bc57-838b-af42-0160a2d73ead" class="toggle"><li><details open=""><summary><strong>결선 심사</strong></summary><div style="display:contents" dir="auto"><ul id="5ca86836-bc57-828b-bbdc-813b1c0ab0be" class="bulleted-list"><li style="list-style-type:disc">결선 심사는 6/25(목) 오프라인으로 진행될 예정입니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="c7386836-bc57-83e7-acfd-819f5c854da6" class="bulleted-list"><li style="list-style-type:disc">심사를 통해 최종 10팀을 선정해 시상식을 진행합니다.</li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="78786836-bc57-8295-9f9e-01c21f1212c1" class="toggle"><li><details open=""><summary><strong>예선 심사 기준</strong></summary><div style="display:contents" dir="auto"><ul id="d2d86836-bc57-82d7-89e4-81815741b5aa" class="bulleted-list"><li style="list-style-type:disc"><mark class="highlight-orange"><strong>기획력 (30점)</strong></mark><div style="display:contents" dir="auto"><ul id="f4086836-bc57-83a9-9f02-011341ccf2a9" class="bulleted-list"><li style="list-style-type:circle">서비스 기획 의도(문제 발견 및 해결)가 명확하고 실질적인가?</li></ul></div><div style="display:contents" dir="auto"><ul id="f5986836-bc57-8369-8a7e-01ab7cf202cb" class="bulleted-list"><li style="list-style-type:circle"> 기존 서비스와는 차별화된 독창적인 아이디어로 기획하였는가?</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="b3886836-bc57-820c-8ec9-018b3b1fe00b" class="bulleted-list"><li style="list-style-type:disc"><mark class="highlight-orange"><strong>실현 가능성 (30점)</strong></mark><div style="display:contents" dir="auto"><ul id="c3386836-bc57-83c5-8264-81fc390124ca" class="bulleted-list"><li style="list-style-type:circle">서비스 구현을 위해 프롬프트를 체계적, 구체적으로 기획하고 작성하였는가?</li></ul></div><div style="display:contents" dir="auto"><ul id="68886836-bc57-83f8-a6d6-81c067bea745" class="bulleted-list"><li style="list-style-type:circle">개발, 테스트, 보완 등의 여러 시도를 통해 서비스의 완성도를 높이고, <br/>안정적으로 운영할 수 있는 구현 수준을 갖추었는가?</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="57486836-bc57-82e1-a9b7-81d68a56472f" class="bulleted-list"><li style="list-style-type:disc"><mark class="highlight-orange"><strong>확장성 (25점)</strong></mark><div style="display:contents" dir="auto"><ul id="84186836-bc57-8228-9b13-01dcc108a06c" class="bulleted-list"><li style="list-style-type:circle">서비스 구현을 위해 선정한 아이디어가 다양한 서비스로 고도화, 확장될 가능성이 있는가?
